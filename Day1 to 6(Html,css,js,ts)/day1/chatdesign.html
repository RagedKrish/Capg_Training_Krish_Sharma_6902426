<!DOCTYPE html>
<html>
<head>
<title>Pattern Example</title>
</head>

<body>

<table border="1" cellpadding="20" cellspacing="0">

<tr>
    <th>Col 1</th>
    <th rowspan="3">Col 2 (3 rows)</th>
    <th rowspan="2">Col 3 (2 rows)</th>
</tr>

<tr>
    <td>Row 2</td>
</tr>

<tr>
    <td>Row 3</td>
    <th rowspan="2">Col 3 (next 2 rows)</th>
</tr>

<tr>
    <td>Row 4</td>
    <td>Col 2 ends</td>
</tr>

</table>

</body>
</html>
