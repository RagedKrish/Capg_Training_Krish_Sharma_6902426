<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        margin: 0px;
      }
      a {
        text-decoration: none;
      }
      a:hover {
        color: wheat;
        font-size: large;
      }
      .nav {
        display: flex;
        justify-content: space-around;
        align-items: center;
        height: 80px;
      }
      .cont {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 30px;
      }
      .form {
        width: 300px;
        height: 500px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.6);
        padding: 30px;
        margin: 50px;
      }
      .form input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        background: transparent;
        border: none;
        border-bottom: 1px solid white;
        color: white;
      }

      .Submit-btn {
        width: 100%;
        padding: 10px;
        background: wheat;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      .link {
        text-align: center;
        margin-top: 10px;
        font-size: 14px;
      }

      .link a {
        color: wheat;
        text-decoration: none;
      }

      .liw {
        text-align: center;
        margin: 10px 0;
      }

      .icons {
        text-align: center;
        font-size: 20px;
      }

      .icons span {
        margin: 0 8px;
        cursor: pointer;
      }
      .join {
        width: 100px;
        height: 40px;
        border-radius: 10px;
        background-color: wheat;
      }
      body {
        background-image: url("bmw.jpg");
        background-size: cover; /* image covers full screen */
        background-position: center; /* keeps image centered */
        background-repeat: no-repeat;
        height: 100vh;
        color: white;
      }
      a:active {
        color: wheat;
      }
      a {
        color: white;
      }

      .Submit-btn {
        border-radius: 10px;
        margin-top: 30px;
      }
      .Search {
        height: 30px;
        border-radius: 10px;
      }
      .butser {
        height: 35px;
        width: 90px;
        border-radius: 10px;
        background-color: wheat;
      }
      .head {
        font-size: 40px;
      }
      .form label {
        font-size: 14px;
        display: block;
        margin-top: 10px;
        color: white;
      }

      .form textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        background: transparent;
        border: none;
        border-bottom: 1px solid white;
        color: white;
        resize: none;
        height: 80px;
      }
      .dropdown {
        position: relative;
        display: inline-block;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        background: rgba(0, 0, 0, 0.8);
        min-width: 150px;
        border-radius: 8px;
        overflow: hidden;
      }

      .dropdown-content a {
        color: white;
        padding: 10px;
        display: block;
        text-decoration: none;
      }

      .dropdown-content a:hover {
        background-color: wheat;
        color: black;
      }

      .dropdown:hover .dropdown-content {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <h1 style="color: wheat">PraRoz</h1>
      <a href="fake.html">HOME</a>
      <a href="https://www.google.com">ABOUT</a>

      <div class="dropdown">
        <a href="#">SERVICE</a>
        <div class="dropdown-content">
          <a href="#">Web Design</a>
          <a href="#">App Development</a>
          <a href="#">SEO</a>
        </div>
      </div>

      <a href="https://www.google.com">DESIGN</a>
      <a href="fakeform.html">CONTACT</a>

      <span>
        <input class="Search" type="text" />
        <input class="butser" type="button" value="Search" />
      </span>
    </div>
    <div class="cont">
      <div class="form">
        <h2>CONTACT</h2>

        <form action="#" method="post">
          <label>Name</label>
          <input type="text" placeholder="Enter your name" required />

          <label>Email</label>
          <input type="email" placeholder="Enter your email" required />

          <label>Subject</label>
          <input type="text" placeholder="Subject" required />

          <label>Message</label>
          <textarea placeholder="Write your message..." required></textarea>

          <button class="Submit-btn" type="submit">Submit</button>
        </form>
      </div>
    </div>
  </body>
</html>
