<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parent {
        width: 100%;
        height: 95vh;
        background-color: aqua;
        display: grid;
        grid-template-columns: repeat(6,1fr);
        grid-template-rows: repeat(12,1fr);
      }
      .cont{
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: red;
        margin: 5px;
      }
      .c1{
        grid-row-start: 1;
        grid-row-end: 13;
      }
      .c2{
        grid-row-start: 1;
        grid-row-end: 7;
      }
      .c3{
        grid-row-start: 7;
        grid-row-end: 13;
      }
      .c4{
        grid-row-start: 1;
        grid-row-end: 5;
      }
      .c5{
        grid-row-start: 5;
        grid-row-end: 9;
      }
      .c6{
        grid-row-start: 9;
        grid-row-end: 13;
      }
      .c7{
        grid-row-start: 1;
        grid-row-end: 4;
      }
      .c8{
        grid-row-start: 4;
        grid-row-end: 7;
      }
      .c9{
        grid-row-start: 7;
        grid-row-end: 10;
      }
      .c10{
        grid-row-start: 10;
        grid-row-end: 13;
      }
      .c11{
        grid-row-start: 1;
        grid-row-end: 3;
      }
      .c12{
        grid-row-start: 3;
        grid-row-end: 5;
      }
      .c13{
        grid-row-start: 5;
        grid-row-end: 7;
      }
      .c14{
        grid-row-start: 7;
        grid-row-end: 9;
      }
      .c15{
        grid-row-start: 9;
        grid-row-end: 11;
      }
      .c16{
        grid-row-start: 11;
        grid-row-end: 13;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="cont c1">1</div>
      <div class="cont c2">2</div>
      <div class="cont c3">3</div>
      <div class="cont c4">4</div>
      <div class="cont c5">5</div>
      <div class="cont c6">6</div>
      <div class="cont c7">7</div>
      <div class="cont c8">8</div>
      <div class="cont c9">9</div>
      <div class="cont c10">10</div>
      <div class="cont c11">11</div>
      <div class="cont c12">12</div>
      <div class="cont c13">13</div>
      <div class="cont c14">14</div>
      <div class="cont c15">15</div>
      <div class="cont c16">16</div>
      <div class="cont c17">17</div>
      <div class="cont c18">18</div>
      <div class="cont c19">19</div>
      <div class="cont c20">20</div>
      <div class="cont c21">21</div>
      <div class="cont c22">22</div>
      <div class="cont c23">23</div>
      <div class="cont c24">24</div>
      <div class="cont c25">25</div>
      <div class="cont c26">26</div>
      <div class="cont c27">27</div>
      <div class="cont c28">28</div>
    </div>
  </body>
</html>
