<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* ---------- GLOBAL ---------- */
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #222;
      }

      h1 {
        text-align: center;
        margin-top: 20px;
      }

      nav {
        text-align: center;
        margin: 20px 0;
      }

      nav a {
        text-decoration: none;
        margin: 0 15px;
        color: #0077ff;
        font-weight: bold;
      }

      nav a:hover {
        text-decoration: underline;
      }

      /* ---------- APP CONTAINER ---------- */
      #app {
        max-width: 900px;
        margin: auto;
        padding: 10px;
      }

      /* ---------- PRODUCT CARD ---------- */
      .product {
        background: white;
        border-radius: 10px;
        padding: 15px;
        margin: 15px 0;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        transition: 0.2s;
      }

      .product:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
      }

      .product h3 {
        margin: 5px 0;
      }

      /* ---------- BUTTON ---------- */
      button {
        background: #0077ff;
        border: none;
        color: white;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 8px;
        transition: 0.2s;
      }

      button:hover {
        background: #005fd1;
      }

      button:active {
        transform: scale(0.96);
      }

      /* ---------- IMAGE GRID (PRODUCT PAGE) ---------- */
      /* PRODUCT IMAGE GRID */
      #imgs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin: 15px 0;
      }

      /* SAME SIZE IMAGES */
      #imgs img {
        width: 100%;
        height: 140px; /* fixed height */
        object-fit: cover; /* keeps image ratio, crops extra */
        border-radius: 8px;
        border: 1px solid #ddd;
      }

      #imgs img:hover {
        transform: scale(1.05);
      }

      /* ---------- CART ---------- */
      .cart-item {
        background: white;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .qty-controls button {
        margin: 0 5px;
      }
      /* HOME PRODUCT IMAGE */
      .product-img {
        width: 100%;
        height: 300px;
        object-fit: contain;
        border-radius: 8px;
        margin-bottom: 10px;
      }
      /* CART ITEM */
      .cart-item {
        display: flex;
        align-items: center;
        gap: 15px;
        background: white;
        padding: 12px;
        margin: 12px 0;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* CART IMAGE */
      .cart-img {
        width: 90px;
        height: 90px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #ddd;
      }

      /* CART TEXT */
      .cart-info {
        flex: 1;
      }

      .qty-controls button {
        margin: 0 6px;
      }
      /* MAIN PREVIEW IMAGE */
      .main-img {
        width: 100%;
        max-width: 400px;
        height: 350px;
        object-fit: cover;
        border-radius: 10px;
        display: block;
        margin: 15px auto;
        border: 1px solid #ddd;
      }

      /* THUMBNAIL CONTAINER */
      #thumbs {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      /* THUMBNAILS */
      .thumb {
        width: 70px;
        height: 70px;
        object-fit: cover;
        cursor: pointer;
        border-radius: 6px;
        border: 2px solid transparent;
        transition: 0.2s;
      }

      .thumb:hover {
        border-color: #0077ff;
        transform: scale(1.05);
      }
      /* ---------- TOAST NOTIFICATION ---------- */
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #222;
        color: white;
        padding: 12px 18px;
        border-radius: 8px;
        font-weight: bold;
        opacity: 0;
        transform: translateY(-20px);
        transition: all 0.3s ease;
        z-index: 999;
      }

      /* visible state */
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <h1>Mini Ecommerce</h1>

    <nav>
      <a href="?">Home</a>
      <a href="?page=cart">Cart</a>
    </nav>

    <div id="app"></div>
    <script src="ecom.js"></script>
  </body>
</html>
