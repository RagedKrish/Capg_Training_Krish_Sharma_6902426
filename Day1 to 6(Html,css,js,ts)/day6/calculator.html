<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basic Calculator</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    .calculator {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 220px;
    }

    .display {
      width: 100%;
      height: 40px;
      margin-bottom: 10px;
      text-align: right;
      font-size: 20px;
      padding: 5px;
      border: none;
      border-radius: 5px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 40px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #444;
      color: white;
    }

    button:hover {
      background: #666;
    }

    #equal {
      background: orange;
    }
  </style>
</head>

<body>

  <div class="calculator">
    <input type="text" readonly class="display" placeholder="0">

    <div class="buttons">
      <button class="num" id="7">7</button>
      <button class="num" id="8">8</button>
      <button class="num" id="9">9</button>
      <button id="/">/</button>

      <button class="num" id="4">4</button>
      <button class="num" id="5">5</button>
      <button class="num" id="6">6</button>
      <button id="*">*</button>

      <button class="num" id="1">1</button>
      <button class="num" id="2">2</button>
      <button class="num" id="3">3</button>
      <button id="-">-</button>

      <button class="num" id="0">0</button>
      <button id="+">+</button>
      <button id="reset">C</button>
      <button id="equal">=</button>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
